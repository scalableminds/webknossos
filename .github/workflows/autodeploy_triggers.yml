name: Autodeployment

# triggers the auto dev deployment flow defined in autodeploy.yml and cleans up after PR is closed
#   - trigger path 1: when autodeploy label is added to PR
#       - check-autodeploy-label is called when the label is added. (that’s its if condition)
#       - it fetches relevant information and then sets a skip boolean
#       - trigger-autodeployment-on-label depends on it and in case skip is false then calls autodeploy.
#   - trigger path 2: when CI pipeline completes on push
#       - check-build-smoketest-push-result is called when the CI after a push completes (that’s its if condition)
#       - it fetches relevant information and then sets an enabled boolean
#       - trigger-autodeployment-on-ci-success depends on it and in case enabled is true then calls autodeploy.
#   - trigger path 3: when PR is merged or closed
#       - cleanup-deployment-on-close is called when a PR is closed (that’s its if condition)
#       - it deletes the github deployment if necessary

on:
  pull_request:
    types:
      - labeled
      - closed
  workflow_run:
    workflows:
      - "CI Pipeline"
    types:
      - completed

jobs:
  check-autodeploy-label:
    runs-on: ubuntu-22.04
    if: ${{ github.event.label.name == 'autodeploy' }}
    permissions:
      actions: read
    outputs:
      skip: ${{ steps.check_build.outputs.skip }}
      dynamic_env: ${{ steps.check_build.outputs.dynamic_env }}
      env_url: ${{ steps.check_build.outputs.env_url }}
    steps:
      - name: Check for in-progress CI build on this branch
        id: check_build
        run: |
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$HEAD_REF" \
            --workflow "CI Pipeline" \
            --json databaseId,status,event \
            --jq 'first(.[] | select((.status == "in_progress" or .status == "queued") and .event == "push") | .databaseId) // empty')
          if [ -n "$run_id" ]; then
            echo "CI run $run_id is in progress and will trigger deployment on completion — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
          SANITIZED=$(echo "$HEAD_REF" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | sed 's/^[0-9]*//')
          echo "env_url=https://${SANITIZED}.webknossos.xyz" >> "$GITHUB_OUTPUT"

          # Create a unique environment name based on the sanitized branch
          echo "dynamic_env=dev-${SANITIZED}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}

  trigger-autodeployment-on-label:
    needs: check-autodeploy-label
    if: ${{ needs.check-autodeploy-label.outputs.skip != 'true' }}
    uses: ./.github/workflows/autodeploy.yml
    permissions:
      deployments: write
    with:
      branch: ${{ github.head_ref }}
      dynamic_env: ${{ needs.check-autodeploy-label.outputs.dynamic_env }}
      env_url: ${{ needs.check-autodeploy-label.outputs.env_url }}
    secrets:
      autodeploy_token: ${{ secrets.AUTO_DEV_DEPLOY_TOKEN }}

  check-build-smoketest-push-result:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' }}
    permissions:
      actions: read
      pull-requests: read
    outputs:
      enabled: ${{ steps.check_build.outputs.enabled }}
      dynamic_env: ${{ steps.check_build.outputs.dynamic_env }}
      env_url: ${{ steps.check_build.outputs.env_url }}
    steps:
      - name: Check build-smoketest-push result and autodeploy label
        id: check_build
        run: |
          JOB_CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" --jq '.jobs[] | select(.name=="build-smoketest-push") | .conclusion')
          if [ "$JOB_CONCLUSION" != "success" ]; then
            echo "build-smoketest-push job did not succeed (conclusion: $JOB_CONCLUSION). Skipping autodeploy."
            exit 0
          fi
          LABELS=$(gh pr list --repo "${{ github.repository }}" --head "$HEAD_BRANCH" --json labels --jq '.[0].labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -qx "autodeploy"; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            SANITIZED=$(echo "$HEAD_BRANCH" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | sed 's/^[0-9]*//')
            echo "env_url=https://${SANITIZED}.webknossos.xyz" >> "$GITHUB_OUTPUT"
            echo "dynamic_env=dev-${SANITIZED}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

  trigger-autodeployment-on-ci-success:
    needs: check-build-smoketest-push-result
    if: ${{ needs.check-build-smoketest-push-result.outputs.enabled == 'true' }}
    uses: ./.github/workflows/autodeploy.yml
    permissions:
      deployments: write
    with:
      branch: ${{ github.event.workflow_run.head_branch }}
      dynamic_env: ${{ needs.check-build-smoketest-push-result.outputs.dynamic_env }}
      env_url: ${{ needs.check-build-smoketest-push-result.outputs.env_url }}
    secrets:
      autodeploy_token: ${{ secrets.AUTO_DEV_DEPLOY_TOKEN }}

  cleanup-deployment-on-close:
    runs-on: ubuntu-22.04
    if: ${{ github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'autodeploy') }}
    permissions:
      deployments: write
    steps:
      - name: Calculate branch environment name
        id: get_env
        run: |
          # Replicate the exact same sanitization logic as done during creation
          SANITIZED=$(echo "$HEAD_REF" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | sed 's/^[0-9]*//')
          echo "dynamic_env=dev-${SANITIZED}" >> "$GITHUB_OUTPUT"
        env:
          HEAD_REF: ${{ github.head_ref }}
      - name: Delete deployment environment
        uses: bobheadxi/deployments@v1.5.0
        with:
          step: delete-env
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ steps.get_env.outputs.dynamic_env }}
