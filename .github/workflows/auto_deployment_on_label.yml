name: Autodeployment

on:
  pull_request:
    types:
      - labeled
      - closed

jobs:
  cleanup-deployment-on-close:
    runs-on: ubuntu-22.04
    if: ${{ github.event.action == 'closed' }}
    permissions:
      deployments: write
    steps:
      - name: Deactivate deployment environment
        uses: bobheadxi/deployments@v1
        with:
          step: deactivate-env
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ github.head_ref }}

  trigger-autodeployment-on-label:
    runs-on: ubuntu-22.04
    if: ${{ github.event.label.name == 'autodeploy' }}
    permissions:
      deployments: write
    steps:
      - name: Check for in-progress CI build on this branch
        id: check_build
        run: |
          run_id=$(gh run list \
            --branch "${{ github.head_ref }}" \
            --workflow "CI Pipeline" \
            --json databaseId,status,event \
            --jq 'first(.[] | select((.status == "in_progress" or .status == "queued") and .event == "push") | .databaseId) // empty')
          if [ -n "$run_id" ]; then
            echo "CI run $run_id is in progress and will trigger deployment on completion — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
          SANITIZED=$(echo "${{ github.head_ref }}" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | sed 's/^[0-9]*//')
          echo "env_url=https://${SANITIZED}.webknossos.xyz" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Start deployment
        if: steps.check_build.outputs.skip != 'true'
        uses: bobheadxi/deployments@v1
        id: gh_deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ github.head_ref }}
      - name: Trigger autodeployment hook
        if: steps.check_build.outputs.skip != 'true'
        run: |
          curl -X POST kubernetix.scm.io/hooks/onBranchImagePushed \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: $AUTO_DEV_DEPLOY_TOKEN" \
            -d "{\"branch\": \"${{ github.head_ref }}\"}"
        env:
          AUTO_DEV_DEPLOY_TOKEN: ${{ secrets.AUTO_DEV_DEPLOY_TOKEN }}
      - name: Finish deployment
        if: always() && steps.check_build.outputs.skip != 'true'
        uses: bobheadxi/deployments@v1
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.gh_deployment.outputs.env }}
          deployment_id: ${{ steps.gh_deployment.outputs.deployment_id }}
          env_url: ${{ steps.check_build.outputs.env_url }}
