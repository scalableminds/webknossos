@(additionalFooter: String)(content:Html)
<html>

<body style="background-color: #f0f2f5; margin: 0; padding: 0;">
  <style type="text/css">
    body,
    p,
    li,
    h2 {
      font-family: "Monospaced Number", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial,
        sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>

  <div style="background-color: #f0f2f5; padding: 32px 16px;">
    <div style="margin-left: auto; margin-right: auto; max-width: 600px;">

      <a href="https://webknossos.org">
        <img src="https://static.webknossos.org/mails/email-header.600.png"
          alt="WEBKNOSSOS" style="width: 100%; max-width: 600px; display: block; border-radius: 8px 8px 0 0;" />
      </a>
      <div style="background-color: #ffffff; border-radius: 0 0 8px 8px; padding: 36px 40px 40px 40px; color: #333333;">
        @content
      </div>

      <p style="text-align: center; padding-top: 28px; padding-bottom: 4px;">
        <a href="https://webknossos.org"><img src="https://static.webknossos.org/mails/icon-webknossos.png"
            alt="WEBKNOSSOS" style="width: 40px; height: 40px; margin: 0 6px;" /></a>
        <a href="https://docs.webknossos.org"><img src="https://static.webknossos.org/mails/icon-docs.png"
            alt="Documentation" style="width: 40px; height: 40px; margin: 0 6px;" /></a>
        <a href="https://www.youtube.com/@webknossos"><img
            src="https://static.webknossos.org/mails/icon-video.png" alt="YouTube Channel"
            style="width: 40px; height: 40px; margin: 0 6px;" /></a>
        <a href="https://twitter.com/webknossos"><img src="https://static.webknossos.org/mails/icon-twitter.png"
            alt="Twitter Channel" style="width: 40px; height: 40px; margin: 0 6px;" /></a>
        <a href="https://bsky.app/profile/webknossos.org"><img src="https://static.webknossos.org/mails/icon-bluesky.png"
            alt="Bluesky Channel" style="width: 40px; height: 40px; margin: 0 6px;" /></a>
      </p>

      <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 20px 0;" />

      <p style="color: #aaaaaa; font-size: 0.65rem; line-height: 1.6; text-align: center; margin: 0 0 8px 0;">
        You are receiving this email because you signed up for an account on WEBKNOSSOS. You may
        cancel your account at any time.
      </p>
      <p style="color: #aaaaaa; font-size: 0.65rem; text-align: center; margin: 0;">
        @Html(additionalFooter)
      </p>

      <div style="height: 40px;">&nbsp;</div>
    </div>
  </div>
</body>

</html>
