name: "Autodeploy Branch"
description: "Starts a GitHub deployment, triggers the kubernetix onBranchImagePushed webhook, and finishes the deployment"
inputs:
  branch:
    description: "Branch name to deploy"
    required: true
  dynamic_env:
    description: "Dynamic GitHub deployment environment name"
    required: true
  env_url:
    description: "URL of the deployed environment"
    required: true
  github_token:
    description: "Token used for the GitHub Deployments API"
    required: true
  autodeploy_token:
    description: "Auth token for the kubernetix onBranchImagePushed webhook"
    required: true
runs:
  using: "composite"
  steps:
    - name: Start deployment
      uses: bobheadxi/deployments@v1.5.0
      id: gh_deployment
      with:
        step: start
        token: ${{ inputs.github_token }}
        env: ${{ inputs.dynamic_env }}

    - name: Trigger autodeployment hook
      id: trigger_hook
      shell: bash
      run: |
        curl -X POST https://kubernetix.scm.io/hooks/onBranchImagePushed \
          -H "Content-Type: application/json" \
          -H "X-Auth-Token: $AUTO_DEV_DEPLOY_TOKEN" \
          -d "{\"branch\": \"$BRANCH\"}"
      env:
        AUTO_DEV_DEPLOY_TOKEN: ${{ inputs.autodeploy_token }}
        BRANCH: ${{ inputs.branch }}

    - name: Finish deployment
      if: always() && steps.gh_deployment.outputs.deployment_id != ''
      uses: bobheadxi/deployments@v1.5.0
      with:
        step: finish
        token: ${{ inputs.github_token }}
        # Composite actions don't have access to the calling job's `job` context,
        # so status is derived from whether the hook call itself succeeded.
        status: ${{ steps.trigger_hook.outcome == 'success' && 'success' || 'failure' }}
        env: ${{ steps.gh_deployment.outputs.env }}
        deployment_id: ${{ steps.gh_deployment.outputs.deployment_id }}
        env_url: ${{ inputs.env_url }}
        override: true
