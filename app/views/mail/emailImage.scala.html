@(src: String, alt: String, srcset: Option[String] = None, width: Int = 300, height: Int = 250)

<div style="text-align: center;">
  <img src="@{src}"
    @if(srcset.isDefined) { srcset="@{srcset.get}" }
    alt="@{alt}"
    style="width: @{width}px; height: @{height}px; margin-top: 10px; margin-bottom: 20px;" />
</div>
