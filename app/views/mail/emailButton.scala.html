@(label: String, url: String)

<div style="text-align: center;">
  <a href="@{url}" style="
      color: #fff;
      padding: 4px 15px;
      margin: 10px;
      height: 32px;
      background: #5660ff;
      border: 1px solid #808cff;
      text-align: center;
      font-weight: 400;
      font-size: 14px;
      line-height: 2.1;
      text-decoration: none;
      border-radius: 4px;
      display: inline-block;
    ">
    @{label}
  </a>
</div>
