name: Autodeployment

on:
  pull_request:
    types:
      - labeled

jobs:
  trigger-autodeployment-on-label:
    runs-on: ubuntu-22.04
    if: ${{ github.event.label.name == 'autodeploy' }}
    steps:
      - name: Check for in-progress CI build on this branch
        id: check_build
        run: |
          run_id=$(gh run list \
            --branch "${{ github.head_ref }}" \
            --workflow "CI Pipeline" \
            --json databaseId,status,event \
            --jq 'first(.[] | select((.status == "in_progress" or .status == "queued") and .event == "push") | .databaseId) // empty')
          if [ -n "$run_id" ]; then
            echo "CI run $run_id is in progress and will trigger deployment on completion — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger autodeployment
        if: ${{ steps.check_build.outputs.skip != 'true' }}
        run: |
          curl -X POST kubernetix.scm.io/hooks/onBranchImagePushed \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: $AUTO_DEV_DEPLOY_TOKEN" \
            -d "{\"branch\": \"${{ github.head_ref }}\"}"
          SANITIZED=$(echo "${{ github.head_ref }}" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | sed 's/^[0-9]*//')
          DEPLOYMENT_URL="https://${SANITIZED}.webknossos.xyz"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          SHA="${{ github.event.pull_request.head.sha }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MARKER="<!-- autodeployment-comment -->"
          BODY=$(printf '%s\n🚀 Deployed commit `%s` to [%s](%s)\n\n_Triggered at: %s_' \
            "$MARKER" "${SHA:0:7}" "$DEPLOYMENT_URL" "$DEPLOYMENT_URL" "$TIMESTAMP")
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" --field body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
        env:
          AUTO_DEV_DEPLOY_TOKEN: ${{ secrets.AUTO_DEV_DEPLOY_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
